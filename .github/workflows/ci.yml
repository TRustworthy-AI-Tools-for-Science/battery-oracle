name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.12
      - name: Sync (core + dev)
        run: uv sync --group dev
      - name: Ruff lint
        run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.12
      - name: Sync (core + dev, no heavy extras)
        run: uv sync --group dev
      - name: Fast tests (no slow PyBaMM sims, no autoeis)
        run: uv run pytest -m "not slow" -q
