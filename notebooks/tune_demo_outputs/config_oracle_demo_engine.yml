# demo oracle calibration (preset: accelerated).
# Overrides config_oracle.yml protocol_scaling fields.
# Generated by battery_oracle.tune on 2026-07-13.
# For the base defaults and field descriptions, see config_oracle.yml.
# To regenerate (jones2022 adapter): python -m battery_forecast.bin.tune_oracle \
#   --dataset demo --cell-id autoeis_battery_dataset --preset accelerated \
#   --n-trials 12 --max-cycles 4 \
#   --ks-min 0.105 --ks-max 0.489 \
#   --srs-min 0.013 --srs-max 0.994 \
#   --dds-min 0.203 --dds-max 695

cycling:
  n_cycles: 1
  parameter_set: Chen2020
  chemistry: Chen2020
  temperature_K: 298.15

eis:
  freq_min_hz: 0.01
  freq_max_hz: 10000.0
  n_freq_points: 60
  noise_level: 0.02
  noise_model: combined
  # Non-stationarity drift (EIS measured while the OCP still relaxes); coupled to
  # cycling.rest_s. Hallemans, Howey, Widanage et al. 2023 (arXiv:2304.08126)
  # Eqs (40)/(43). 0.0 disables. See _calibration.drift below.
  drift_scale: 0
  drift_tau_s: 600
  drift_n_periods: 4

degradation:
  preset: accelerated
  eol_capacity_fraction: 0.8
  capacity_check: true
  ec_diffusivity_base_factor: 0.25
  dod_lam_scale: 0   # C_rate_1 (charge-rate) lever; 0 = disabled (charge rate has no lifetime effect)

protocol_scaling:
  real_cell_capacity_mah_legacy_default: 200.0  # always auto-detect per cell
  kinetics_scale: 0.16930133678272968
  sei_rate_scale: 0.5227270589225135
  dead_li_decay_scale: 46.17
  plating_rate_scale: 0.4202

_calibration:
  date: "2026-07-13"
  method: "battery_oracle.tune (battery-oracle package)"
  cells_used:
    primary: autoeis_battery_dataset
  cycle_window: "first 4 valid cycles"

  kinetics_scale:
    status: "partial — gap > 25%"
    target_metric: "mean (R3+R5)/R1 across charge+discharge EIS fits"
    real_target: "~33.81 (autoeis_battery_dataset)"
    achieved: "~42.81 (autoeis_battery_dataset)"
    sweep_tried: "[0.10478033749915432, 0.12034268329208288, 0.1506026921956498, 0.16930133678272968, 0.17829842130950638, 0.19190022160576, 0.19902864464288136, 0.22719903866796573, 0.2925419519682933, 0.3832918812408075, 0.47545852132572614, 0.4893791248372152]"
    note: "R3-vs-R5 individual labeling unstable (two similarly-sized arcs in
           AutoEIS) — only the SUM (R3+R5)/R1 is a stable comparison target."

  sei_rate_scale:
    status: "validated"
    target_metric: "R1 growth % over cycle window (charge ECM)"
    real_target: "+48.22% over 4 cycles (autoeis_battery_dataset)"
    achieved: "+92.47% over 4 cycles"
    bo_range_searched: "[0.013, 0.994]"

  dead_li_decay_scale:
    best_value: 46.17
    target_metric: "R1 growth % — controls dead-Li accumulation from plating"
    bo_range_searched: "[0.203, 695]"
    note: "Higher dds = faster dead-Li dissolution = lower R1 growth from plating pathway"

  plating_rate_scale:
    best_value: 0.4202
    target_metric: "R1 growth % and EOL — controls how much Li is plated per cycle"
    bo_range_searched: "[0.0105, 7.45]"
    note: "Lower prs = slower plating = less dead Li formed = lower R1 growth AND longer EOL (unlike dds which trades one for the other)"

  dod_lam_scale:
    best_value: 0
    target_metric: "C_rate_1 (charge-rate) sensitivity — DoD/charge-stress LAM, stress ~ sqrt(C_rate_1*DoD)"
    bo_range_searched: "[0, 0]"
    note: "0.0 disables (charge rate then has no lifetime effect); it is the ONLY degradation mode
           coupled to C_rate_1. Magnitude is an engineering choice (jones2022 shallow DoD cannot fit it).
           Higher dl = stronger charge-rate sensitivity but shorter EOL. sqrt law caps the 1C-vs-8C
           loss-rate ratio near sqrt(8)~2.83 at full LAM dominance."

  implied_eol_cycle:
    status: "validated (within 2x)"
    target_metric: "Cycles to SOH<0.80, extrapolated from per-cycle capacity loss over the calibration window (or actual EOL cycle if reached within the window)"
    real_target: "~55.00 (config_oracle.yml preset_constants.accelerated.target_eol_cycles_at_1c midpoint)"
    achieved: "~97.78"
    note: "Keeps the search within ~2x of the documented per-preset EOL target,
           so candidates cannot satisfy arc_ratio/r1_growth while reaching real
           EOL in <10 cycles or not for hundreds of cycles."

  capacity_fade:
    status: "n/a — cache carries no real_soh (EIS-driven calibration)"
    target_metric: "mean per-cycle real-SOH loss over the calibration window"
    real_soh_fade_per_cycle: "n/a"
    achieved_soh_fade_per_cycle: "0.002045"
    note: "Sole health signal for EIS-less datasets (CALCE/Oxford/MATR): when the
           cache has null ECMs but per-cycle real_soh, the fit is driven by this
           term and the preset EOL anchor above is not used. n/a for EIS-driven
           calibration (no real_soh in the cache)."

  crate_sensitivity:
    status: "skipped (--skip-crate-probe-legacy; not the primary check for jones2022)"
    target_metric: "ratio of per-cycle SOH-loss-rate at high-C vs low-C synthetic probe"
    target_min_ratio: 3
    achieved_ratio: "n/a"
    probe_levels_mA: "low=n/a  high=n/a"
    note: "Engineering target, not measured from real data. crate_probe_skipped=true
           means this run used --skip-crate-probe-legacy and the config has NOT been
           checked for this."

  crate2_slope:
    status: "skipped (--skip-crate2-slope; NOT validated against real C_rate_2 data)"
    target_metric: "d(capacity_fade_mAh)/d(C_rate_2_mA), oracle vs real multi-cell slope"
    real_slope_mAh_per_mA: "n/a"
    real_95pct_ci: "[n/a, n/a]"
    real_n_cells: n/a
    achieved_slope_mAh_per_mA: "n/a"
    note: "Primary, real-data-calibrated replacement for the engineering-guessed
           crate_sensitivity term above. Requires the oracle.py _C2_MAX_mA clip
           fix (0.5C -> 2C)."

  drift:
    status: "disabled (drift_scale=0)"
    target_metric: "linKK low/high-freq residual ratio (non-stationarity signature)"
    real_target_ratio: "n/a"
    achieved_ratio: "n/a"
    ratio_when_well_rested: "n/a"
    tau_relax_s: 600
    n_periods: 4
    basis: >
      EIS measured while the OCP still relaxes -> a time-varying impedance whose
      drift v0(t) leaks into the low-frequency, KK-violating residual. Model:
      Hallemans, Howey, Widanage et al. 2023 (arXiv:2304.08126) Eqs (40)/(43).
    limitation: >
      PARKED default-OFF. Only the v0(t) drift-leakage part of Eq (43) is
      implemented; integer-period single-sine extraction rejects slow drift, so
      the oracle ratio cannot reach the real target at any scale/tau.

  method: "Optuna TPE/GP Bayesian optimisation over (ks, srs, dds, prs) 4D log-space"
  n_trials: 12
