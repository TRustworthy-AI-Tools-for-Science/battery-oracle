# Base PyBaMMOracle hyperparameters (oracle.py defaults, Chen2020 parameter set).
#
# This file is parsed, not just documentation: every field here is read by
# battery_oracle.experiment.oracle_kwargs_from_oracle_config() and used to
# override PyBaMMOracle's own Python-literal defaults. A field omitted here
# falls back to that Python default. This is the fallback config: dataset-
# specific calibrations produced by the tune-oracle skill live alongside it as
# config_oracle_{dataset}.yml and override any field here (commonly
# `protocol_scaling` and `degradation`) -- point an experiment YAML's
# top-level `oracle_config:` field at one to use it (see that skill for the
# calibration workflow).

cycling:
  n_cycles: 1
  parameter_set: Chen2020          # pybamm.ParameterValues("Chen2020"), 5 Ah NMC/graphite pouch cell
  temperature_K: 298.15            # 25 degC; sets "Ambient temperature [K]" when != 298.15
  initial_soc: 0.80                # first-call starting SOC (keeps initial OCV inside the voltage window)
  rest_s: 1200.0                   # OCV rest (s) on each side of a cycle, before/after EIS (Jones et al. 2022)

solver:
  # PyBaMM solver tolerances. IDAKLUSolver (primary) ignores dt_max_s; it only
  # applies to the CasadiSolver fallback used when IDAKLU is unavailable.
  primary:
    rtol: 1.0e-3
    atol: 1.0e-6
    dt_max_s: 60.0
  # Deliberately a different solver family (not just looser primary tolerances):
  # CasadiSolver(mode="safe") integrates through the CC->CV control-mode switch
  # that reproducibly trips IDAKLUSolver. See oracle.py:_build_native_state.
  emergency:
    rtol: 1.0e-2
    atol: 1.0e-5
    dt_max_s: 10.0

# Physical bounds for the Chen2020 SPMe (nominal capacity ~5 Ah). Sanitises
# protocol vectors before building the PyBaMM Experiment -- see
# oracle.py:_sanitise_current/_sanitise_duration/_protocol_to_experiment.
protocol_bounds:
  c_min_mA: 50.0            # charge step 1 / discharge lower bound
  c_max_mA: 10000.0         # 2C on a 5 Ah cell -- SPMe/solver accuracy degrades above this
  c2_min_mA: 20.0           # charge step 2 (taper stage) lower bound
  c2_max_mA: 10000.0        # shares the 2C ceiling with c_max_mA (see oracle.py comment)
  dur_min_s: 60.0
  dur_max_s: 28800.0        # 8 h
  v_charge_max: 4.3         # charge safety cutoff (V) -- Jones, Stimming & Lee 2022
  v_discharge_min: 3.0      # discharge cutoff (V)
  charge_stage_max_s: 900.0 # 15 min per CC charge stage (paper limit)

eis:
  freq_min_hz: 0.01
  freq_max_hz: 10000.0
  n_freq_points: 60                # np.logspace(-2, 4, 60)
  noise_level: 0.02                # fractional amplitude; mimics ~2% potentiostat noise typical of lab EIS
  noise_model: combined            # white | flicker | combined | none
  # "combined" noise budget split between the flicker (1/f) and white terms.
  noise_combined_flicker_frac: 0.75
  noise_combined_white_frac: 0.25
  # SOC is clamped to this range before EIS is simulated (avoids the SPMe
  # particle-concentration singularities at the extremes).
  soc_clip_min: 0.05
  soc_clip_max: 0.99
  # Non-stationarity drift (EIS measured while the OCP still relaxes); coupled
  # to cycling.rest_s. Hallemans, Howey, Widanage et al. 2023 (arXiv:2304.08126)
  # Eqs (40)/(43). 0.0 disables (default -- see oracle.py's known-limitation note).
  drift_scale: 0.0
  drift_tau_s: 600.0
  drift_n_periods: 4.0
  # Kramers-Kronig linKK validation (impedance.py), used both for the oracle's
  # per-cycle linkk_rmse diagnostic and the tune engine's drift calibration.
  linkk:
    c: 0.85
    max_M: 50

ecm:
  # Equivalent-circuit structure fitted to each EIS spectrum. The ECM parameter
  # layout AND the tune engine's arc-ratio / R1-growth metrics are DERIVED from
  # this circuit (ohmic R = the resistor outside any [R,CPE] arc; arc Rs are the
  # bracketed resistors) -- no fixed element count is assumed anywhere. Load it via
  # battery_oracle.load_default_ecm_circuit(); the tune engine falls back to it when
  # no circuit is passed. AutoEIS labels: Rx=resistor, Pxw=CPE admittance, Pxn=CPE
  # exponent, so this 9-parameter circuit -> [R1,P2w,P2n,R3,P4w,P4n,R5,P6w,P6n].
  circuit: "R1-P2-[R3,P4]-[R5,P6]"
  # AutoEIS initial-guess seeds for the CPE terms, keyed by canonical AutoEIS
  # label. Admittance (w) seeds are jones2022 training-partition medians, kept
  # close to the training scale; exponents (n) are typical for Li-ion SPMe at
  # moderate SOC (Chen2020). Unknown labels (e.g. a migrated circuit) fall back
  # to w_default/n_default.
  cpe_seeds:
    w:
      P2w: 7.32
      P4w: 0.071
      P6w: 0.043
    n:
      P2n: 0.85
      P4n: 0.80
      P6n: 0.75
    w_default: 0.1
    n_default: 0.80
  # Spectrum-rescaling target ohmic resistance for the AutoEIS fit (Option B):
  # pooled training-median R1 (ohmic) across jones2022 featurized records. Set
  # to null to disable rescaling. See oracle.py's _autoeis_ecm docstring.
  rescale_target_r0: 0.1334
  autoeis:
    num_warmup: 500
    num_samples: 200

degradation:
  preset: accelerated              # nominal | accelerated | severe (see oracle.py:_build_degradation_config)
  eol_capacity_fraction: 0.80       # OracleFailure raised when SOH < this
  capacity_check: false            # true appends a C/20 reference charge+discharge each call (~20x slower, more accurate)

  # Universal correction applied identically across all presets -- electrolyte
  # quality is treated as a cell property, not a degradation-severity setting.
  ec_diffusivity_base_factor: 0.25 # Chen2020 EC diffusivity x this, before protocol_scaling.sei_rate_scale is also applied

  lam_ceiling: 0.95        # max allowed loss-of-active-material fraction fed into the EIS linearisation

  # DISABLED BY DEFAULT (scale=0.0). Explicit, additive C_rate_2 capacity-loss
  # term, kept for provenance -- see oracle.py's c2_stress docstring for why it
  # is off (the fitted real-data slope was found to be a measurement-noise
  # artifact, not a validated relationship).
  c2_stress:
    scale: 0.0
    slope_mah_per_ma: 0.0794
    ref_ma: 75.27

  # DISABLED BY DEFAULT (0.0). Explicit, additive depth-of-discharge /
  # charge-induced-stress LAM term -- see oracle.py's dod_lam_scale docstring.
  # Must be calibrated to a literature magnitude or deep-DoD dataset before
  # enabling.
  dod_lam_scale: 0.0

  # Read by oracle.py:_build_degradation_config for the active preset above.
  # NOTE: particle_cracking is DISABLED in all presets (PyBaMM 26.6.2.0 regression).
  # The Chen2020 LGM50 graphite OCP causes IDAGetDky: IDA_BAD_K at t=0 when
  # 'particle mechanics: swelling and cracking' is active. Root cause: the cracking
  # stress submodel evaluates dOCP/dc at initial conditions; the LGM50 function
  # returns inconsistent values that make IDA DAE initialization fail.
  # C-rate sensitivity is preserved via lithium plating kinetics in
  # accelerated/severe presets. Nominal loses C-rate sensitivity (SEI only).
  # See oracle.py:_build_degradation_config comments (2026-06-23) for full writeup.
  preset_constants:
    nominal:
      sei: true
      lithium_plating: false
      particle_cracking: false           # disabled — PyBaMM 26.6.2.0 regression
      sei_on_cracks: false
      target_eol_cycles_at_1c: "200-400"  # SEI-only → much slower degradation
    accelerated:
      sei: true
      lithium_plating: true
      particle_cracking: false           # disabled — PyBaMM 26.6.2.0 regression
      sei_on_cracks: false
      plating_kinetic_rate_constant_m_s: 1.0e-8
      dead_lithium_decay_constant_s: 4.0e-6
      initial_plated_lithium_concentration_mol_m3: 0.0
      target_eol_cycles_at_1c: "40-70"
    severe:
      sei: true
      lithium_plating: true
      particle_cracking: false           # disabled — PyBaMM 26.6.2.0 regression
      sei_on_cracks: false               # also disabled (cracking required)
      plating_kinetic_rate_constant_m_s: 1.0e-7
      dead_lithium_decay_constant_s: 1.0e-4
      initial_plated_lithium_concentration_mol_m3: 0.0
      target_eol_cycles_at_1c: "20-50"

# Real-cell calibration knobs. These are what the tune-oracle skill searches over
# when fitting the oracle to a specific dataset's real EIS + capacity data.
protocol_scaling:
  # real_cell_capacity_mah is intentionally NOT set here: it varies per cell (e.g.
  # jones2022 PJ121 ~42 mAh, PJ100 ~45 mAh) and should be auto-detected per cell at
  # runtime from its own formation-cycle discharge (see
  # jones_oracle_study.detect_real_capacity_mah), not pinned to one dataset-wide
  # value. The legacy default below is only used if auto-detection is unavailable.
  real_cell_capacity_mah_legacy_default: 200.0

  kinetics_scale: 1.0   # exchange-current-density multiplier; <1 slows charge-transfer
                          # kinetics and grows the relative EIS arc size (R3/R1, R5/R1)
  sei_rate_scale: 1.0    # multiplies EC diffusivity (on top of ec_diffusivity_base_factor
                          # above); <1 slows SEI/R1 growth rate, but with sharply
                          # diminishing effect once growth becomes reaction-limited (see
                          # oracle.py's sei_rate_scale docstring -- R1 growth-rate
                          # calibration is not fully solved by this knob; scaling "SEI
                          # kinetic rate constant" was tried and reverted, as it moved
                          # growth the WRONG direction). Needed because kinetics_scale
                          # has a side effect on SEI growth rate too (lower
                          # exchange-current density raises overpotential, which the SEI
                          # growth law is exponential in -- see ORACLE.md SS2.1), so this
                          # knob exists to un-confound the two effects, even though it
                          # currently only partially succeeds.
  dead_li_decay_scale: 1.0  # multiplier on Dead lithium decay constant [s-1]:
                              #   accelerated base: 4e-6 s-1  → 4e-6 * dead_li_decay_scale
                              #   severe base:      1e-4 s-1  → 1e-4 * dead_li_decay_scale
                              # Higher values = faster dead-Li dissolution = less dead-Li
                              # accumulation from plating = lower R1 ohmic growth.
                              # Swept via 4D Bayesian optimisation in tune_oracle.py.
  plating_rate_scale: 1.0   # multiplier on Lithium plating kinetic rate constant [m.s-1]:
                              #   accelerated base: 1e-8 m/s → 1e-8 * plating_rate_scale
                              #   severe base:      1e-7 m/s → 1e-7 * plating_rate_scale
                              # Lower values = slower Li plating = less dead Li formed per
                              # cycle = lower R1 growth AND longer EOL (unlike dead_li_decay_scale
                              # which trades one against the other).
                              # Swept via 4D Bayesian optimisation in tune_oracle.py.
